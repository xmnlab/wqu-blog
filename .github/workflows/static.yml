name: Deploy Quarto site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          environment-file: conda.yaml
          activate-environment: wqu-blog
          auto-activate-base: false

      - name: Verify build tools
        run: |
          quarto --version
          makim --version

      - name: Build site
        run: |
          makim pages.build
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check GitHub Pages setup
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          response_file="$(mktemp)"
          status="$(
            curl -sS \
              -o "$response_file" \
              -w "%{http_code}" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/pages"
          )"

          if [ "$status" = "404" ]; then
            {
              echo "### GitHub Pages is not enabled"
              echo
              echo "Enable Pages before deploying this site:"
              echo
              echo "1. Open https://github.com/${GITHUB_REPOSITORY}/settings/pages"
              echo "2. Under Build and deployment, set Source to GitHub Actions."
              echo "3. Rerun this workflow."
            } >> "$GITHUB_STEP_SUMMARY"

            echo "::error title=GitHub Pages is not enabled::Open https://github.com/${GITHUB_REPOSITORY}/settings/pages and set Source to GitHub Actions, then rerun this workflow."
            exit 1
          fi

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error title=Could not read GitHub Pages settings::GitHub API returned HTTP ${status}."
            cat "$response_file"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
