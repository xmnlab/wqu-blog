name: Publish Quarto site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "gh-pages"
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          environment-file: conda.yaml
          activate-environment: wqu-blog
          auto-activate-base: false

      - name: Verify build tools
        run: |
          quarto --version
          makim --version

      - name: Build site
        run: |
          makim pages.build
          touch _site/.nojekyll

      - name: Publish to gh-pages
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail

          deploy_dir="${RUNNER_TEMP}/gh-pages"
          rm -rf "$deploy_dir"
          mkdir -p "$deploy_dir"
          cp -a _site/. "$deploy_dir/"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git fetch --no-tags --depth=1 origin gh-pages:refs/remotes/origin/gh-pages; then
            git checkout -B gh-pages refs/remotes/origin/gh-pages
          else
            git checkout --orphan gh-pages
          fi

          git rm -r --ignore-unmatch .
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "$deploy_dir"/. .
          touch .nojekyll

          git add --all
          if git diff --cached --quiet; then
            echo "No site changes to publish."
          else
            git commit -m "Deploy site"
            git push origin gh-pages:gh-pages
          fi
